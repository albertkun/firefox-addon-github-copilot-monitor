<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Background circle -->
  <circle cx="48" cy="48" r="44" fill="#161b22" stroke="#30363d" stroke-width="3"/>

  <!-- Battery body outline -->
  <rect x="14" y="36" width="60" height="25" rx="5" ry="5"
        fill="none" stroke="#8b949e" stroke-width="3"/>
  <!-- Battery tip -->
  <rect x="74" y="42" width="8" height="12" rx="3" ry="3" fill="#8b949e"/>

  <!-- Battery fill (approx 50% — static icon) -->
  <rect x="18" y="40" width="27" height="17" rx="3" ry="3" fill="#3fb950"/>

  <!-- Copilot accent line -->
  <line x1="26" y1="70" x2="70" y2="70" stroke="#58a6ff" stroke-width="3"
        stroke-linecap="round"/>
</svg>
