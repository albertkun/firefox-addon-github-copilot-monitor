<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="#161b22" stroke="#30363d" stroke-width="2"/>

  <!-- Battery body outline -->
  <rect x="8" y="18" width="30" height="13" rx="3" ry="3"
        fill="none" stroke="#8b949e" stroke-width="2"/>
  <!-- Battery tip -->
  <rect x="38" y="21.5" width="4" height="6" rx="1.5" ry="1.5" fill="#8b949e"/>

  <!-- Battery fill (approx 50% — static icon) -->
  <rect x="10" y="20" width="14" height="9" rx="1.5" ry="1.5" fill="#3fb950"/>

  <!-- Copilot "visor" hint — small accent line -->
  <line x1="14" y1="35" x2="34" y2="35" stroke="#58a6ff" stroke-width="2"
        stroke-linecap="round"/>
</svg>
