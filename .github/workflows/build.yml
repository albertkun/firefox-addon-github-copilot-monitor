name: Build Firefox Addon

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag version '$TAG_VERSION' does not match manifest version '$MANIFEST_VERSION'" >&2
            exit 1
          fi
      - name: Upload artifact
        # Upload the raw extension files (not a pre-built zip). GitHub's
        # upload-artifact action always wraps the uploaded path in a zip when
        # you download it from the Actions UI, so uploading a pre-built .zip
        # would produce a zip-of-a-zip and Firefox would reject the download
        # with "does not contain a valid manifest". By uploading the raw files
        # here, the artifact download IS a directly installable .xpi/.zip.
        uses: actions/upload-artifact@v4
        with:
          name: github-copilot-monitor-${{ steps.version.outputs.version }}
          path: |
            manifest.json
            background.js
            content.js
            popup/**
            icons/**
          if-no-files-found: error

      - name: Package addon for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          zip -r "github-copilot-monitor-${{ steps.version.outputs.version }}.zip" \
            manifest.json \
            background.js \
            content.js \
            popup/ \
            icons/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: github-copilot-monitor-${{ steps.version.outputs.version }}.zip
